name: Daily Humanities Explainer

on:
  schedule:
    # GitHub 的 cron 用 UTC! 这里默认 UTC 12:00 = 北京时间(UTC+8)晚上 20:00
    # 与科技版(早 7:00)错峰发送。改时间: 北京时间 X 点 -> UTC (X-8) 点。
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # 允许手动 Run workflow 测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python daily_humanities_explainer.py
